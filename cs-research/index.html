{
id:7, title:"Qualitative Research",
desc:"Understanding the art of in-depth exploration through interviews, observations, and case studies — seeking meaning, not measurement.",
notes:[
{heading:"What is Qualitative Research?",
body:`Qualitative research represents a fundamentally different approach to understanding the world compared to quantitative methods. While quantitative research asks <em>"how many" and "how much,"</em> qualitative research asks <em>"what, why, and how"</em> — seeking to understand the meanings, experiences, and perspectives of people.

<strong>Key Characteristics (Patton, 2002):</strong>
• <strong>Naturalistic Inquiry:</strong> Studying real-world situations as they unfold naturally, without manipulation or control
• <strong>Inductive Analysis:</strong> Immersing in data to discover categories and patterns, rather than testing pre-set hypotheses
• <strong>Holistic Perspective:</strong> Understanding the whole phenomenon as a complex system, not reducing it to discrete variables
• <strong>Thick Description:</strong> Providing detailed, rich accounts that capture the context and complexity of human experience
• <strong>Personal Contact:</strong> The researcher has direct, prolonged engagement with people and situations
• <strong>Dynamic Systems:</strong> Recognizing that change is constant — processes matter as much as outcomes
• <strong>Design Flexibility:</strong> The research design evolves as understanding deepens, not locked into a rigid plan

<strong>Philosophical Foundation:</strong> Qualitative research operates within an interpretivist paradigm. It holds that reality is socially constructed, subjective, and multiple. The researcher is not separate from the research but interacts with participants, and their own interpretations shape the findings. As Creswell (2009) noted, in qualitative research "the researcher interacts with that being studied."

<strong>In CS Context:</strong> Qualitative methods are essential for understanding user experiences with technology, organizational impacts of IT systems, developer practices, ethical implications of AI, and many other areas where numbers alone cannot capture the full picture.`},
{heading:"Case Study as a Research Strategy",
body:`The case study is one of the most widely used qualitative strategies in CS research. It involves an in-depth exploration of a <strong>bounded case</strong> — a specific entity, event, or phenomenon within its real-life context.

<strong>Types of Case Studies (Ryan et al., 1992):</strong>
• <strong>Descriptive:</strong> Describes systems, techniques, and procedures currently in use
• <strong>Illustrative:</strong> Illustrates new or innovative practices
• <strong>Experimental:</strong> Examines difficulties in implementing new proposals and evaluates benefits
• <strong>Exploratory:</strong> Explores the reasons behind a particular practice
• <strong>Explanatory:</strong> Explains the reasons for observed practices

<strong>Single vs. Multiple Case Design:</strong>
• <strong>Single case:</strong> Appropriate when the case is critical (testing a theory), extreme, revelatory, or longitudinal. It can make a significant contribution to knowledge.
• <strong>Multiple case:</strong> Used for cross-site comparison. Follows <em>replication logic</em>, not sampling logic — each case is chosen to predict similar results (literal replication) or contrasting results (theoretical replication).

<strong>Important:</strong> Case study research is based on <strong>replication, not sampling logic</strong> (Yin, 2009). You don't select cases to represent a population statistically. You select them to replicate or extend theoretical patterns. This means <strong>theoretical generalization</strong> is possible but <strong>statistical generalization</strong> is not.`},
{heading:"Data Collection Methods",
body:`Qualitative research typically uses multiple data sources to build a rich, triangulated understanding:

<strong>1. In-Depth Interviews:</strong>
The most common data source. Semi-structured or unstructured interviews allow participants to share their perspectives in their own words. The interviewer uses an interview guide but remains flexible, following the participant's lead when interesting directions emerge.

<strong>Key Principles:</strong>
• Use open-ended questions: "Can you describe..." "What was it like when..." "How did you feel about..."
• Avoid leading questions that suggest a desired answer
• Listen actively and follow up on unexpected responses
• Record and transcribe interviews verbatim
• Establish rapport and trust before probing sensitive topics

<strong>2. Observation:</strong>
Direct observation of behaviors, interactions, and processes in natural settings. Can range from complete observer (detached) to participant-as-observer (involved but observing role is known). Field notes are the primary data record and should be detailed, dated, and include the researcher's reflections.

<strong>3. Document Analysis:</strong>
Official documents, organizational records, emails, meeting minutes, and other textual materials provide contextual data that supplements and corroborates interview and observation data. Documents can reveal what people say publicly versus what they do privately.

<strong>4. Artifacts:</strong> Physical or digital objects relevant to the study — system interfaces, code repositories, workflow diagrams, etc.

<strong>Triangulation:</strong> Using multiple data sources is essential for credibility. When interviews, observations, and documents all point to the same conclusions, confidence in the findings increases. Discrepancies between sources are not problems — they are valuable data that reveal complexity.`},
{heading:"Qualitative Data Analysis",
body:`Qualitative data analysis is the process of bringing order, structure, and meaning to the mass of collected data. It is not a linear process but involves iterative cycles of reading, coding, and interpreting.

<strong>The General Process (Creswell, 2007):</strong>
1. <strong>Organize and prepare data:</strong> Transcribe interviews, organize field notes, prepare documents
2. <strong>Read and immerse:</strong> Read through all data to get a holistic sense
3. <strong>Code the data:</strong> Assign labels (codes) to segments of data that represent meaningful concepts
4. <strong>Generate themes:</strong> Group related codes into broader themes
5. <strong>Write analytic memos:</strong> Document your thinking, reflections, and emerging insights throughout
6. <strong>Search for alternative explanations:</strong> Actively look for data that contradicts your emerging themes
7. <strong>Represent and visualize:</strong> Use tables, matrices, diagrams, and narratives to present findings
8. <strong>Interpret and draw conclusions:</strong> Connect findings to the literature and theoretical framework

<strong>Thematic Analysis:</strong> The most widely used approach. It involves identifying patterns (themes) across the dataset. Themes can be:
• <strong>Deductive:</strong> Pre-defined based on theory (top-down)
• <strong>Inductive:</strong> Emerging from the data (bottom-up)
• <strong>Hybrid:</strong> Combining both approaches

<strong>Software Tools:</strong> NVivo, ATLAS.ti, and MAXQDA can assist with organizing and coding large datasets. However, they are tools for management, not analysis — the intellectual work of interpretation remains with the researcher.`},
{heading:"Ensuring Quality: Validity and Reliability",
body:`Quality in qualitative research is assessed differently from quantitative research:

<strong>Instead of "Validity" — Credibility:</strong>
Are the findings an accurate representation of participants' experiences? Ensured through:
• Prolonged engagement in the field
• Triangulation of data sources
• Member checking (sharing findings with participants for verification)
• Peer debriefing (having colleagues review your analysis)

<strong>Instead of "Reliability" — Dependability:</strong>
Can the findings be traced back to the data? Ensured through:
• Detailed audit trail documenting all research decisions
• Step-by-step documentation of data collection and analysis procedures
• Code book and coding examples

<strong>Instead of "Generalizability" — Transferability:</strong>
Can findings apply to other contexts? Ensured through:
• Thick description of the research context
• Clear delineation of the boundaries of the case
• Honest reporting of limitations

<strong>Theoretical Generalization (Not Statistical):</strong>
In case study research, generalization is not based on sampling from a population but on extending theory to other cases. As Yin (2009) argued, case studies rely on theoretical inference — the findings are generalizable to other cases that share similar theoretical characteristics, not to all cases in a statistical sense.

<strong>Humphrey and Scapens (1996):</strong> "Theories are rhetorical devices for both interpreting case studies and convincing the research community as to the validity of the case findings and interpretations."`},
{heading:"Ethical Considerations in Qualitative Research",
body:`Qualitative research involves deep, personal engagement with human participants, making ethical considerations particularly important:

<strong>Informed Consent:</strong> Participants must understand the research purpose, what participation involves, their right to withdraw at any time, and how their data will be used and protected. Consent should be ongoing — participants can withdraw even after data collection.

<strong>Confidentiality and Anonymity:</strong> Ensure that participants cannot be identified from published findings. This may require changing names, locations, and other identifying details. Be aware that in small communities or organizations, anonymity may be difficult to guarantee.

<strong>Power Dynamics:</strong> The researcher often holds more power than participants (especially in workplace studies). Be mindful of how this affects what participants share and how you represent their views.

<strong>Data Storage:</strong> Audio recordings, transcripts, and field notes contain sensitive personal information. Secure storage (encrypted files, password protection) and clear data retention policies are essential.

<strong>Researcher Positionality:</strong> Reflexively examine how your own background, values, and assumptions influence the research. Acknowledge your positionality in your writing.

<strong>Do No Harm:</strong> Consider the potential consequences of your research for participants and their communities. Research that exposes wrongdoing or critiques powerful organizations may put participants at risk.`}
],

{
id:8, title:"Hybrid Research (Mixed Methods)",
desc:"Combining quantitative and qualitative approaches for comprehensive understanding — team structures, integration strategies, and practical challenges.",
notes:[
{heading:"What is Mixed Methods Research?",
body:`Mixed methods research (MMR) formally integrates quantitative and qualitative approaches within a single study to provide a more complete understanding of a research problem than either approach alone could achieve.

<strong>The Core Idea:</strong> Quantitative research tells you <em>what</em> is happening and <em>how much</em>; qualitative research tells you <em>why</em> and <em>how</em>. When combined, they provide both breadth and depth of understanding.

<strong>Why Mixed Methods in CS?</strong> Computer science research increasingly deals with complex, multifaceted problems that cannot be adequately addressed by numbers alone or words alone. For example:
• Evaluating a new software tool: Quantitative metrics (performance, error rates) + Qualitative insights (user experience, workflow impact)
• Studying AI adoption: Survey data on adoption rates + Interviews exploring barriers and enablers
• Assessing cybersecurity practices: Metrics on vulnerability rates + Case studies of organizational culture

<strong>Key Principle:</strong> Mixed methods is not simply doing a quantitative study AND a qualitative study side by side. It requires genuine <strong>integration</strong> — the quantitative and qualitative components must connect, inform, and enhance each other at some point in the research process.`},
{heading:"Types of Mixed Methods Designs",
body:`<strong>1. Convergent Design:</strong>
• Collect quantitative and qualitative data <strong>simultaneously</strong>
• Analyze each separately
• <strong>Merge</strong> results during interpretation
• Best for: When both types of data are equally important and you want a comprehensive picture

<strong>2. Explanatory Sequential Design:</strong>
• Collect <strong>quantitative data first</strong>
• Analyze quantitative results
• Use qualitative data to <strong>explain</strong> the quantitative findings
• Best for: When you want to understand why quantitative results turned out as they did (e.g., survey shows low adoption → interviews explore reasons)

<strong>3. Exploratory Sequential Design:</strong>
• Collect <strong>qualitative data first</strong>
• Analyze qualitative results
• Develop quantitative instruments based on qualitative findings
• Collect quantitative data to <strong>test or generalize</strong> qualitative findings
• Best for: When you need to explore a topic before you can measure it (e.g., interviews identify factors → survey measures their prevalence)

<strong>4. Embedded Design:</strong>
• One method is <strong>primary</strong>, the other is <strong>secondary/embedded</strong>
• The secondary method supports or supplements the primary method
• Best for: When one method dominates but needs supplementary data

<strong>5. Multiphase Design:</strong>
• Multiple phases of data collection over time
• Each phase may use a different design
• Best for: Large-scale, long-term research programs`},
{heading:"Points of Integration",
body:`Integration is what distinguishes true mixed methods from simply conducting two separate studies. Integration can occur at several points:

<strong>1. Design Level:</strong> The research questions themselves require both quantitative and qualitative data to answer.

<strong>2. Data Collection Level:</strong> Using the same participants for both components, or using qualitative findings to determine who to include in the quantitative phase.

<strong>3. Data Analysis Level:</strong>
• <strong>Merging:</strong> Bringing datasets together for comparison (e.g., comparing survey results with interview themes side by side)
• <strong>Connecting:</strong> Using results from one phase to inform the next (e.g., interview themes determine survey items)
• <strong>Embedding:</strong> One type of data is embedded within the analysis of the other

<strong>4. Interpretation Level:</strong> Using both sets of results together to draw conclusions that neither set could support alone. This is where the "1+1=3" effect of mixed methods becomes apparent.

<strong>Joint Display:</strong> A visual representation (table, matrix, diagram) that shows both quantitative and qualitative results together and their connections. Joint displays are increasingly required by journals to demonstrate genuine integration.`},
{heading:"Building the Research Team",
body:`Mixed methods research requires diverse expertise that rarely resides in a single person. The composition and dynamics of the research team are critical:

<strong>Multidisciplinary vs. Interdisciplinary vs. Transdisciplinary (Rosenfield, 1992):</strong>
• <strong>Multidisciplinary:</strong> Researchers work in parallel from disciplinary-specific bases to address common problems. Limited interaction between approaches.
• <strong>Interdisciplinary:</strong> Researchers work jointly but from disciplinary-specific bases. More interaction but still maintaining disciplinary boundaries.
• <strong>Transdisciplinary:</strong> Researchers work jointly using a shared conceptual framework that draws together disciplinary theories and approaches. The highest level of integration.

<strong>Team Composition Principles:</strong>
• Include both quantitative and qualitative expertise
• Include domain expertise relevant to the research problem
• Ensure breadth (coverage of all needed methods) AND depth (ability to rigorously execute each method)
• Multiple team members should be involved in integration, not just one person
• A history of successful collaboration among team members strengthens proposals

<strong>The Role of the Principal Investigator:</strong>
The PI should have a broad perspective across methods, the ability to bridge different perspectives, skills in facilitating dialogue, sensitivity to workload imbalances, and commitment to educating team members about unfamiliar methods. The most effective MMR leader may not be the deepest expert in any one method but rather the best integrator.`},
{heading:"Practical Challenges and Solutions",
body:`<strong>Challenge 1: Epistemological Tension.</strong> Quantitative and qualitative approaches often rest on different philosophical assumptions (positivism vs. interpretivism). Team members may disagree about what constitutes valid knowledge.

<strong>Solution:</strong> Acknowledge the tension explicitly. Adopt a pragmatic philosophical stance that values "what works" over philosophical purity. Create team norms that respect both traditions.

<strong>Challenge 2: Time and Resource Demands.</strong> Doing two types of research well takes roughly twice the time and resources of a single-method study.

<strong>Solution:</strong> Be realistic about scope. Consider embedded designs where one method is secondary. Seek funding that explicitly supports mixed methods.

<strong>Challenge 3: Integration Difficulties.</strong> Genuine integration is harder than it appears. Many published "mixed methods" studies simply report quantitative and qualitative results in separate sections without connecting them.

<strong>Solution:</strong> Plan integration from the design stage, not as an afterthought. Use joint displays. Have team members with cross-method expertise lead integration.

<strong>Challenge 4: Publication Challenges.</strong> Some journals favor one method over another. Page limits may not allow adequate reporting of both components.

<strong>Solution:</strong> Target journals that explicitly welcome mixed methods. Consider publishing multiple papers from one study. Use supplementary materials.

<strong>Challenge 5: Training Gaps.</strong> Most researchers are trained in one tradition. Team members may lack competence in the other method.

<strong>Solution:</strong> Invest in team training. Use collaborative learning where quantitative experts learn from qualitative experts and vice versa. Engage consultants when needed.`}
],

{text:"A mixed methods perspective cannot simply be added at the end of the research development process by including a 'mixed methods expert' on the team.",author:"Creswell et al. (2011)"},

{
id:9, title:"Ethical Issues in Research",
desc:"Navigating the moral landscape of research — from informed consent and data protection to AI ethics, intellectual property, and professional responsibility.",
notes:[
{heading:"The Foundation: Morality, Ethics, and the Law",
body:`Understanding research ethics requires distinguishing three related but distinct concepts:

<strong>Morality:</strong> A set of rules for right conduct — a system that modifies and regulates behavior. Moral codes are shared behavioral patterns that have evolved for the survival of groups and societies. They include principles like the Golden Rule ("Do unto others as you would have them do unto you") that appear across virtually all cultures and religions.

<strong>Ethics:</strong> The systematic, philosophical study of morality. While morality provides the rules, ethics provides the reasoning behind them. Ethics asks not just "what is right?" but "why is it right?" and "what should we do when moral rules conflict?"

<strong>Law:</strong> Formal rules enacted by governing bodies, with enforcement mechanisms. Laws may codify moral principles but the relationship is not simple — some laws may be immoral (historical examples abound), and some moral obligations may not be legally required.

<strong>In Research:</strong> Legal compliance is necessary but not sufficient for ethical research. A study may be legally permissible but ethically questionable (e.g., collecting publicly available social media data without users' awareness). Ethical research requires going beyond minimum legal requirements to consider the broader moral implications of your work.`},
{heading:"The Trinity of Good Research",
body:`Kolstoe and Pugh (2024) propose that good research requires three interconnected elements:

<strong>1. Research Integrity:</strong> Honesty and transparency in the conduct of research. This includes:
• Not fabricating or falsifying data
• Not plagiarizing others' work
• Accurately reporting methods and results, including negative findings
• Properly acknowledging contributions of others
• Sharing data and materials when possible (open science principles)
• Declaring conflicts of interest

<strong>2. Research Ethics:</strong> Protecting the rights, dignity, and welfare of participants and affected communities. This includes:
• Obtaining informed consent
• Ensuring confidentiality and data protection
• Minimizing risk of harm
• Ensuring fair recruitment (no exploitation)
• Special protections for vulnerable populations
• Ethical use of AI and automated systems in research

<strong>3. Research Governance:</strong> The systems and processes that ensure integrity and ethics are maintained. This includes:
• Institutional Review Boards (IRBs) / Ethics Committees
• Data protection policies and compliance
• Research oversight and monitoring
• Publication ethics (peer review, editorial standards)
• Institutional policies on conflicts of interest

<strong>The Key Insight:</strong> These three elements are necessary but not sufficient individually. Research with strong governance but weak integrity still fails. Research with strong ethics but poor governance may lack accountability. All three must work together.`},
{heading:"Core Ethical Principles in Research",
body:`<strong>1. Respect for Persons (Autonomy):</strong>
Participants must be treated as autonomous agents capable of making their own decisions. This requires:
• <strong>Informed Consent:</strong> Participants must receive sufficient information about the study (purpose, procedures, risks, benefits, alternatives, right to withdraw) in understandable language
• Consent must be voluntary — free from coercion or undue influence
• For vulnerable populations (children, prisoners, cognitively impaired), additional protections are needed

<strong>2. Beneficence:</strong>
Maximize benefits and minimize harms. This requires:
• A careful assessment of risks and benefits before the study begins
• The research must have a favorable risk-benefit ratio
• Risks should be minimized through careful design
• Benefits may be direct (to participants) or indirect (to society/knowledge)

<strong>3. Justice:</strong>
Fair distribution of the burdens and benefits of research. This requires:
• Fair selection of participants — don't target vulnerable populations simply because they are easily accessible
• Don't exclude populations who might benefit from the research
• Ensure that groups bearing the risks of research also share in the benefits

<strong>4. Respect for Privacy and Confidentiality:</strong>
Participants have a right to control their personal information. This requires:
• Collecting only data necessary for the research
• Storing data securely
• Reporting findings in ways that prevent identification
• Complying with data protection regulations (GDPR, etc.)`},
{heading:"Ethics in Computing Research: Special Considerations",
body:`Computer science research raises unique ethical challenges that traditional frameworks may not fully address:

<strong>AI and Algorithmic Ethics:</strong>
• <strong>Bias and Fairness:</strong> Algorithms trained on biased data perpetuate and amplify existing inequalities. Researchers must audit training data, test for disparate impact, and consider fairness across demographic groups.
• <strong>Explainability:</strong> Black-box AI systems that cannot explain their decisions raise ethical concerns, especially in high-stakes domains (healthcare, criminal justice, hiring).
• <strong>Accountability:</strong> When an AI system causes harm, who is responsible — the developer, the deployer, the user, or the algorithm itself?
• <strong>Consent for Data Use:</strong> Training AI on publicly available data (social media posts, web content) raises questions about whether individuals consented to this use.

<strong>Data Ethics:</strong>
• <strong>Big Data Paradox:</strong> Large datasets may seem anonymous but can often be re-identified through combination with other data sources.
• <strong>Data Ownership:</strong> Who owns the data generated by users of a platform — the user, the platform, or the researcher?
• <strong>Right to Be Forgotten:</strong> Individuals may have the right to have their data deleted, conflicting with research needs for data retention.

<strong>Software and System Ethics:</strong>
• <strong>Software Risks and Liabilities:</strong> When software fails (e.g., in medical devices, autonomous vehicles), who bears responsibility — the developer, the tester, the deployer?
• <strong>Open Source Ethics:</strong> What are the ethical obligations when releasing software that could be misused?
• <strong>Responsible Disclosure:</strong> How should researchers handle discovered security vulnerabilities?

<strong>Social Impact:</strong>
• <strong>Digital Divide:</strong> Research may widen the gap between those with and without technology access
• <strong>Automation and Employment:</strong> Research that improves automation may displace workers
• <strong>Surveillance:</strong> Research that improves surveillance capabilities may enable authoritarian control`},
{heading:"A Framework for Ethical Decision Making",
body:`When facing an ethical dilemma, the Markkula Center for Applied Ethics (2021) recommends a systematic approach:

<strong>Step 1: Recognize the Ethical Issue.</strong> Is this an ethical question or simply a practical/technical one? Ethical issues involve harm, rights, fairness, or conflicting values.

<strong>Step 2: Get the Facts.</strong> What are the relevant facts? Who are the stakeholders? What are their interests? What are the applicable laws and regulations?

<strong>Step 3: Evaluate Alternative Actions.</strong> Consider the options through multiple ethical lenses:
• <strong>Utilitarian:</strong> Which option produces the greatest good for the greatest number?
• <strong>Rights-based:</strong> Which option best respects the rights of all stakeholders?
• <strong>Justice:</strong> Which option treats people fairly and equitably?
• <strong>Common Good:</strong> Which option serves the community as a whole?
• <strong>Virtue:</strong> Which option reflects the kind of person/researcher I want to be?

<strong>Step 4: Make a Decision and Test It.</strong> After evaluating through multiple lenses, make a decision. Then test it: "Could I justify this decision to my colleagues? To the public? To the affected participants?"

<strong>Step 5: Act and Reflect.</strong> Implement the decision and later reflect on the outcome. Would I make the same decision again? What did I learn?

<strong>In Practice:</strong> Keep an ethics journal throughout your research. Document ethical decisions and their justifications. This creates an audit trail that demonstrates ethical awareness and protects you if questions arise later.`},
{heading:"Professional Codes of Ethics",
body:`Professional organizations have established codes that provide specific guidance for CS practitioners and researchers:

<strong>ACM Code of Ethics and Professional Conduct (2018):</strong> Organized around four principles:
1. <strong>General Ethical Principles:</strong> Contribute to society and human well-being; avoid harm; be honest and trustworthy; be fair and take action not to discriminate; respect privacy; honor confidentiality.
2. <strong>Professional Responsibilities:</strong> Strive for excellence; maintain professional competence; know and respect existing laws; accept and provide appropriate review; give comprehensive and thorough evaluations; foster integrity.
3. <strong>Professional Leadership Principles:</strong> Ensure computing professionals' efforts are used for good; manage personnel and resources to enhance quality of working life; articulate and encourage policies that promote best practices.
4. <strong>Compliance with the Code:</strong> Uphold and promote the principles; treat violations as inconsistent with membership.

<strong>IEEE Code of Ethics:</strong> Commits members to the highest ethical and professional conduct, including: protecting public safety, health, and welfare; avoiding conflicts of interest; being honest in all claims; rejecting bribery; improving understanding of technology's impact.

<strong>Beyond Compliance:</strong> Codes of ethics are necessary but not sufficient. They provide minimum standards, not aspirational goals. Ethical researchers should aim beyond compliance toward genuine moral reflection and responsibility.`}
],

{
id:10, title:"Technical Writing and Research Communication",
desc:"Transforming research into compelling proposals, papers, and presentations — with a practical concept note writing form.",
notes:[
{heading:"The Art of Proposal Writing",
body:`Proposal writing is a creative process — far more than filling in a form or ticking boxes. It is an opportunity to pitch an idea, making it compelling, credible, and inspiring to evaluators.

<strong>Mindset Shift:</strong> Think of your proposal as a persuasive argument, not a bureaucratic document. Every section should build the case for why your research matters, why you are the right person/team to do it, and why it will succeed.

<strong>The Skeleton Outline Approach:</strong>
Before writing full prose, create a skeleton with bullet points under each section heading. This helps you:
• Manage workload and assign tasks early in team projects
• Audit existing material that can be reused or repackaged
• Identify what needs to be developed from scratch
• Ensure you address all requirements without repetition

<strong>Common Proposal Weaknesses:</strong>
• Too much about the organization, not enough about the project
• Vague objectives that don't specify what will actually be done
• No clear connection between problem, objectives, and methodology
• Unrealistic timelines or budgets
• Missing or weak conceptual framework
• Generic content transplanted without adaptation to the specific call

<strong>What Evaluators Look For:</strong>
• Comprehensive understanding of the operating environment
• Adherence to programmatic goals
• Proper resourcing and local networks
• Access to stakeholders and trust-based relationships
• Measurable outcomes using SMART principles
• Good value for money
• Viable methodology that accounts for risks and assumptions
• A lasting project legacy`},
{heading:"Core Principles of Technical Writing",
body:`<strong>1. Clarity:</strong> Use plain language. If a simpler word works, use it. Avoid jargon unless it is necessary and defined. Every sentence should be immediately understandable to your target audience.

<strong>2. Conciseness:</strong> Be brief but complete. Remove redundancy without losing meaning. If you can say it in 10 words, don't use 30. However, conciseness does not mean omitting necessary detail.

<strong>3. Accuracy:</strong> Use correct facts, figures, and citations. Every claim should be supported by evidence. Misrepresenting data or sources is a serious breach of integrity.

<strong>4. Consistency:</strong> Maintain uniform formatting, terminology, and style throughout. If you define an acronym, use it consistently. If you use British spelling, don't switch to American.

<strong>5. Audience Awareness:</strong> Adapt your writing to your readers. A technical paper for specialists can use domain-specific terminology; a policy brief for government officials must translate technical findings into actionable recommendations.

<strong>6. Logical Flow:</strong> Each paragraph should follow from the previous one. Each section should build toward the next. The reader should never have to ask "why are they telling me this?"

<strong>7. Visual Communication:</strong> Use tables, figures, and diagrams to present complex information. A well-designed table can replace paragraphs of text. Every visual should be self-explanatory — readable without reference to the main text.`},
{heading:"Making Academic Writing Coherent",
body:`Coherence is what makes a paper feel like a unified argument rather than a collection of disconnected ideas. Prof. Lennart Nacke (2023) identifies seven practical methods to achieve it:

<strong>1. Parallelism:</strong> Repeat similar phrase structures to create rhythm and balance. This helps readers follow the progression of ideas and emphasizes key points. 
<em>Example:</em> "The first aspect of X is..., the second aspect of X is..., and the third aspect of X is..." — breaking a complex concept into manageable, equally-weighted parts.

<strong>2. Repetition:</strong> Strategically repeat key terms, ideas, or arguments throughout the document to establish coherence and unity. Introduce an important idea in the opening and return to it in the conclusion to underline its significance. This is especially important for core theoretical concepts — do not swap them out for synonyms.

<strong>3. Synonyms:</strong> Vary word choice using synonyms to prevent monotony and maintain reader interest. However, use synonyms only for peripheral descriptive words — never replace your core technical or conceptual terms, as this confuses reviewers.

<strong>4. Lexical Chains:</strong> Use sequences of related words to illustrate consistency and relevance. For example, when discussing technology adoption: "usability → user experience → user satisfaction → user engagement → user loyalty." Lexical chains signal to readers that ideas are conceptually connected.

<strong>5. Topic Sentences:</strong> Begin every paragraph with a clear, succinct topic sentence that states the paragraph's main point and its connection to your overarching argument. This establishes a focused framework and ensures every paragraph earns its place. The topic sentence ties each paragraph back to your research question.

<strong>6. Cohesive Nouns (Umbrella Nouns):</strong> Condense multiple related words or concepts into a single broad term. For example, instead of repeating "buttons, menus, and other related components," use "interface elements." This reduces wordiness, avoids repetition, and creates a more polished tone. Cohesive nouns also make complex topics more accessible.

<strong>7. Transitions:</strong> Use transition words and full transition sentences to connect sections and signal relationships between ideas. 

<strong>Key transition categories and examples:</strong>
• <em>Introducing new content:</em> "This section discusses... / What follows is a description of... / The next section provides a more in-depth description of X."
• <em>Introducing a new topic:</em> "With regard to X... / Regarding X... / Concerning X..."
• <em>Revisiting a topic:</em> "As previously mentioned... / As stated earlier... / Returning briefly to the topic of X..."
• <em>Transitioning between sections:</em> "Let us now consider... / This chapter has established that... / This section examined the causes of X and claimed that..."
• <em>Contrasting arguments:</em> "In contrast to Smith, Jones (2014) has suggested... / Nevertheless, little progress has been achieved in... / Yet, this approach has significant limitations... / On the other hand, there is evidence that contradicts this argument..."

<strong>Why Coherence Matters:</strong> Coherent writing is persuasive writing. When your paper flows logically — with each sentence hinting at the next, each paragraph connecting to the overarching question — readers can follow your argument effortlessly. Incoherent writing forces readers to fill in gaps themselves, and they may fill them incorrectly. In research communication, an argument that is hard to follow is often an argument that is not believed.`},
{heading:"Structure of a Research Paper",
body:`<strong>1. Title:</strong> Informative, precise, and engaging. Place keywords at the beginning. Avoid vague titles.

<strong>2. Abstract (150-300 words):</strong> A mini-version of the entire paper. It should contain: the research problem, objectives, methodology (briefly), key findings, and implications. Many readers will only read the abstract — it must stand alone.

<strong>3. Introduction:</strong>
• Establish the broad context and significance
• Narrow to the specific problem
• Review key literature (briefly — full review may be separate)
• State the research gap
• Present research questions/objectives
• Outline the paper's structure

<strong>4. Literature Review:</strong> Organized thematically, not by article. Should establish what is known, identify gaps, and justify your research. Ends with a clear statement of what your study will address.

<strong>5. Methodology:</strong> Describe and justify your research design, participants, data collection, and analysis procedures in sufficient detail for replication. Explain why your chosen methods are appropriate.

<strong>6. Results:</strong> Present findings objectively, without interpretation. Use tables and figures effectively. Report both positive and negative findings.

<strong>7. Discussion:</strong> Interpret results, connect to literature, explain unexpected findings, acknowledge limitations, and discuss implications.

<strong>8. Conclusion:</strong> Summarize key findings and provide recommendations for practice and future research.

<strong>9. References:</strong> Complete, consistent, and in the required citation style (APA 7th, IEEE, etc.).`},
{heading:"Research Communication Beyond Papers",
body:`Effective researchers communicate through multiple channels:

<strong>Oral Presentations:</strong>
• Structure: Introduction → Problem → Method → Key Finding → Implication → Conclusion
• Use slides as visual aids, not teleprompters — minimal text, clear visuals
• Practice timing — never go over time
• Prepare for questions — anticipate the hardest ones
• Tell a story, don't just report data

<strong>Poster Presentations:</strong>
• Layout: Title at top, columns for sections, clear visual hierarchy
• Minimal text — focus on visuals (charts, diagrams)
• Font size readable from 1 meter away (minimum 24pt)
• Prepare a 2-minute "elevator pitch" for your poster

<strong>Research Communication for Impact:</strong>
• <strong>Blogs:</strong> Translate technical findings for broader audiences
• <strong>Social Media:</strong> Share research highlights, engage with community
• <strong>Policy Briefs:</strong> Distill findings into actionable recommendations for policymakers
• <strong>Public Lectures:</strong> Engage the public with your research
• <strong>Media Engagement:</strong> Work with science communicators to reach wider audiences

<strong>Digital Tools:</strong>
• Writing: LaTeX, Overleaf, MS Word, Google Docs
• References: Mendeley, Zotero, EndNote
• Plagiarism checking: Turnitin, Grammarly, iThenticate
• Visualization: Tableau, Python (matplotlib/seaborn), R (ggplot2)
• Collaboration: GitHub, Notion, Overleaf`},
{heading:"Ethical Standards in Research Communication",
body:`<strong>Plagiarism Avoidance:</strong>
• Always credit sources — direct quotes require quotation marks and citations; paraphrases require citations
• Self-plagiarism (reusing your own published work without citation) is also unethical
• Use plagiarism checking tools before submission

<strong>Data Integrity:</strong>
• Report findings honestly, including negative or unexpected results
• Do not manipulate data, images, or statistics to support a desired conclusion
• Report all conditions, including those that didn't work
• Make data available when possible (open data principles)

<strong>Authorship Ethics:</strong>
• Authorship should be based on substantial contribution to conception, design, data collection, analysis, or writing
• All authors must approve the final version
• Ghost authorship (someone contributed significantly but isn't listed) is unethical
• Gift authorship (someone listed who didn't contribute) is unethical
• Specify each author's contribution in the paper

<strong>Publication Ethics:</strong>
• Don't submit the same paper to multiple journals simultaneously
• Don't slice one study into multiple minimal publications ("salami slicing")
• Disclose all conflicts of interest
• Disclose funding sources
• Participate fairly in peer review when asked

<strong>Accessibility:</strong>
• Make research usable by diverse audiences, including those with disabilities
• Consider alternative formats (plain language summaries, audio descriptions)
• Open access publishing increases reach and impact`}
],

function createParticles() {
  const container = document.getElementById('particles');
  for(let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*8}s;animation-duration:${6+Math.random()*8}s`;
    container.appendChild(p);
  }
}

function buildNav() {
  const nav = document.getElementById('sideNav');
  const items = [
    ...MODULES.map(m => ({id:m.id, label:m.title, type:'module'})),
    {id:'exam', label:'Comprehensive Exam', type:'exam'},
    {id:'cn', label:'Concept Note Builder', type:'cn'}
  ];
  nav.innerHTML = items.map(item => {
    const isSpecial = item.type !== 'module';
    const num = item.type === 'module' ? item.id : (item.type === 'exam' ? '<i class="fas fa-graduation-cap"></i>' : '<i class="fas fa-file-alt"></i>');
    const isCompleted = item.type === 'module' && completedModules.has(item.id);
    return `<div class="nav-item ${isSpecial ? 'special' : ''} ${isCompleted ? 'completed' : ''}" 
      id="nav-${item.id}" onclick="navigate('${item.id}')">
      <div class="num">${num}</div>
      <span>${item.type === 'module' ? 'Module ' + item.id + ': ' : ''}${item.label}</span>
    </div>`;
  }).join('');
}

function navigate(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if(navEl) navEl.classList.add('active');
  if(id === 'exam') renderExam();
  else if(id === 'cn') renderConceptNote();
  else renderModule(parseInt(id));
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0, 0);
}

function renderModule(id) {
  currentModule = id;
  const m = MODULES.find(x => x.id === id);
  if(!m) return;
  if(!currentTab[id]) currentTab[id] = 'notes';
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="module-header">
      <div class="mod-num">Module ${m.id} of ${MODULES.length}</div>
      <h1>${m.title}</h1>
      <p class="mod-desc">${m.desc}</p>
    </div>
    <div class="tabs">
      <div class="tab ${currentTab[id]==='notes'?'active':''}" onclick="switchTab(${id},'notes')"><i class="fas fa-book-open" style="margin-right:6px"></i>Notes</div>
      <div class="tab ${currentTab[id]==='quotes'?'active':''}" onclick="switchTab(${id},'quotes')"><i class="fas fa-quote-left" style="margin-right:6px"></i>Key Quotes</div>
      <div class="tab ${currentTab[id]==='refs'?'active':''}" onclick="switchTab(${id},'refs')"><i class="fas fa-scroll" style="margin-right:6px"></i>References</div>
      <div class="tab ${currentTab[id]==='quiz'?'active':''}" onclick="switchTab(${id},'quiz')"><i class="fas fa-brain" style="margin-right:6px"></i>Quiz</div>
    </div>
    <div id="tab-notes" class="tab-content ${currentTab[id]==='notes'?'active':''}">
      ${m.notes.map((n,i) => `
        <div class="card" style="animation-delay:${i*0.05}s">
          <h3 style="border-left:3px solid var(--accent);padding-left:12px;margin-bottom:16px">${n.heading}</h3>
          <div style="font-size:14px;color:var(--fg2);line-height:1.9;white-space:pre-wrap">${n.body}</div>
        </div>`).join('')}
    </div>
    <div id="tab-quotes" class="tab-content ${currentTab[id]==='quotes'?'active':''}">
      ${m.quotes.map(q => `
        <div class="quote-block">
          <p>${q.text}</p>
          <div class="author">— ${q.author}</div>
        </div>`).join('')}
    </div>
    <div id="tab-refs" class="tab-content ${currentTab[id]==='refs'?'active':''}">
      <div class="card">
        <h3><i class="fas fa-scroll" style="margin-right:8px;color:var(--accent)"></i>Key References</h3>
        <ul class="ref-list">
          ${m.refs.map(r => `<li>${r}</li>`).join('')}
        </ul>
      </div>
    </div>
    <div id="tab-quiz" class="tab-content ${currentTab[id]==='quiz'?'active':''}">
      <div class="quiz-container" id="quiz-${id}">
        ${renderQuiz(m, id)}

      ${id > 1 ? `<button onclick="navigate(${id-1})"><i class="fas fa-arrow-left"></i> Module ${id-1}</button>` : '<span></span>'}

    </div>
  `;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if(navEl) navEl.classList.add('active');
}

function switchTab(moduleId, tab) {
  currentTab[moduleId] = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.closest('.tab').classList.add('active');
  const tc = document.getElementById('tab-' + tab);
  if(tc) { tc.classList.add('active'); }
}

function renderQuiz(m, id) {
  const answered = quizAnswered[id] || {};
  const allAnswered = m.quiz.every((_, i) => answered[i] !== undefined);
  const score = Object.values(answered).filter((a, i) => a === m.quiz[Object.keys(answered)[i]]?.ans).length;
  
  return `
    ${m.quiz.map((q, i) => {
      const userAns = answered[i];
      const isAnswered = userAns !== undefined;
      const isCorrect = isAnswered && userAns === q.ans;
      return `
        <div class="quiz-q ${isAnswered ? (isCorrect ? 'correct' : 'wrong') : ''}" id="qq-${id}-${i}">
          <div class="q-num">Question ${i+1} of ${m.quiz.length}</div>
          <div class="q-text">${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((opt, j) => {
              let cls = 'quiz-opt';
              if(isAnswered) {
                cls += ' disabled';
                if(j === q.ans) cls += ' correct-answer';
                else if(j === userAns && userAns !== q.ans) cls += ' wrong-answer';
              }
              return `<div class="${cls}" onclick="answerQuiz(${id},${i},${j})">${opt}</div>`;
            }).join('')}
          </div>
          ${isAnswered ? `<div class="quiz-feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
            <strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong> ${q.fb}
          </div>` : ''}
        </div>`;
    }).join('')}
    <div class="quiz-score ${allAnswered ? 'show' : ''}" id="score-${id}">
      <h3>Module ${id} Score</h3>
      <p>You answered <strong>${Object.keys(answered).filter(i => answered[i] === m.quiz[i]?.ans).length}</strong> out of <strong>${m.quiz.length}</strong> correctly.</p>
      <button class="btn-quiz" onclick="resetQuiz(${id})"><i class="fas fa-redo" style="margin-right:6px"></i>Retry Quiz</button>
    </div>
  `;
}

function answerQuiz(moduleId, qIdx, optIdx) {
  if(!quizAnswered[moduleId]) quizAnswered[moduleId] = {};
  if(quizAnswered[moduleId][qIdx] !== undefined) return;
  quizAnswered[moduleId][qIdx] = optIdx;
  const m = MODULES.find(x => x.id === moduleId);
  const q = m.quiz[qIdx];
  const isCorrect = optIdx === q.ans;
  const container = document.getElementById(`qq-${moduleId}-${qIdx}`);
  if(container) {
    container.classList.add(isCorrect ? 'correct' : 'wrong');
    container.querySelectorAll('.quiz-opt').forEach((opt, j) => {
      opt.classList.add('disabled');
      if(j === q.ans) opt.classList.add('correct-answer');
      else if(j === optIdx && !isCorrect) opt.classList.add('wrong-answer');
    });
    const fb = document.createElement('div');
    fb.className = `quiz-feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
    fb.innerHTML = `<strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong> ${q.fb}`;
    container.appendChild(fb);
  }
  if(m.quiz.every((_, i) => quizAnswered[moduleId][i] !== undefined)) {
    const scoreEl = document.getElementById('score-' + moduleId);
    if(scoreEl) {
      const correct = Object.keys(quizAnswered[moduleId]).filter(i => quizAnswered[moduleId][i] === m.quiz[i]?.ans).length;
      scoreEl.innerHTML = `<h3>Module ${moduleId} Score</h3>
        <p>You answered <strong>${correct}</strong> out of <strong>${m.quiz.length}</strong> correctly.</p>
        <button class="btn-quiz" onclick="resetQuiz(${moduleId})"><i class="fas fa-redo" style="margin-right:6px"></i>Retry Quiz</button>`;
      scoreEl.classList.add('show');
      completedModules.add(moduleId);
      updateProgress();
      document.getElementById(`nav-${moduleId}`)?.classList.add('completed');
    }
    showToast(`Module ${moduleId} quiz complete! 🎉`);
  }
}

function resetQuiz(moduleId) {
  delete quizAnswered[moduleId];
  renderModule(moduleId);
  switchTabDirect(moduleId, 'quiz');
}

function switchTabDirect(moduleId, tab) {
  currentTab[moduleId] = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if(t.textContent.toLowerCase().includes(tab)) t.classList.add('active');
  });
  const tc = document.getElementById('tab-' + tab);
  if(tc) tc.classList.add('active');
}

function updateProgress() {
  const pct = Math.round((completedModules.size / MODULES.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completedModules.size} / ${MODULES.length} modules completed`;
}

// ===== EXAM =====
function renderExam() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="exam-header">
      <h1><i class="fas fa-graduation-cap" style="margin-right:12px"></i>Comprehensive Exam</h1>
      <p>Test your knowledge across all 10 modules. 25 questions covering every topic in the course.</p>
      ${!examStarted ? '' : `<div class="exam-timer"><i class="fas fa-clock"></i><span id="examTimerDisplay">${formatTime(examTimeLeft)}</span></div>`}
    </div>
    ${!examStarted ? `
      <div class="exam-instructions card">
        <h3><i class="fas fa-info-circle" style="margin-right:8px;color:var(--accent)"></i>Instructions</h3>
        <ul style="margin-top:12px;padding-left:20px">
          <li style="margin-bottom:8px;color:var(--fg2);font-size:14px">The exam contains <strong>25 multiple-choice questions</strong> spanning all 10 modules.</li>
          <li style="margin-bottom:8px;color:var(--fg2);font-size:14px">You have <strong>60 minutes</strong> to complete the exam.</li>
          <li style="margin-bottom:8px;color:var(--fg2);font-size:14px">Each question is worth 1 mark. Your final score will be shown as a percentage.</li>
          <li style="margin-bottom:8px;color:var(--fg2);font-size:14px">Review your module notes and quizzes before attempting this exam.</li>
          <li style="margin-bottom:8px;color:var(--fg2);font-size:14px">A score of <strong>70% or above</strong> is considered a pass.</li>
        </ul>
        <button class="btn-quiz" style="margin-top:20px" onclick="startExam()"><i class="fas fa-play" style="margin-right:8px"></i>Start Exam</button>
      </div>` : renderExamQuestions()}
  `;
}

function startExam() {
  examStarted = true;
  examAnswers = {};
  examTimeLeft = 60 * 60;
  renderExam();
  examTimer = setInterval(() => {
    examTimeLeft--;
    const td = document.getElementById('examTimerDisplay');
    if(td) td.textContent = formatTime(examTimeLeft);
    if(examTimeLeft <= 0) { clearInterval(examTimer); submitExam(); }
  }, 1000);
}

function formatTime(s) {
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function renderExamQuestions() {
  const submitted = Object.keys(examAnswers).length === EXAM_QUESTIONS.length && document.getElementById('examResult');
  return `
    <div id="examQContainer">
      ${EXAM_QUESTIONS.map((q,i) => `
        <div class="quiz-q" id="eq-${i}" style="border-left:3px solid var(--border)">
          <div class="q-num" style="display:flex;justify-content:space-between">
            <span>Question ${i+1} of ${EXAM_QUESTIONS.length}</span>
            <span class="tag">${q.module}</span>
          </div>
          <div class="q-text">${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((opt,j) => `
              <div class="quiz-opt ${examAnswers[i]===j?'selected':''}" onclick="selectExamAnswer(${i},${j})">${opt}</div>
            `).join('')}
          </div>
        </div>`).join('')}
      <div style="display:flex;gap:12px;margin-top:24px;align-items:center">
        <button class="btn-quiz" onclick="submitExam()"><i class="fas fa-paper-plane" style="margin-right:8px"></i>Submit Exam</button>
        <span style="font-size:13px;color:var(--muted)">${Object.keys(examAnswers).length} / ${EXAM_QUESTIONS.length} answered</span>
      </div>
      <div class="exam-result" id="examResult"></div>
    </div>
  `;
}

function selectExamAnswer(qIdx, optIdx) {
  if(document.querySelector(`#eq-${qIdx} .correct-answer`)) return;
  examAnswers[qIdx] = optIdx;
  document.querySelectorAll(`#eq-${qIdx} .quiz-opt`).forEach((o,j) => {
    o.classList.toggle('selected', j === optIdx);
  });
  const counter = document.querySelector('[onclick="submitExam()"] + span');
  if(counter) counter.textContent = `${Object.keys(examAnswers).length} / ${EXAM_QUESTIONS.length} answered`;
}

function submitExam() {
  clearInterval(examTimer);
  examStarted = false;
  let correct = 0;
  EXAM_QUESTIONS.forEach((q,i) => { if(examAnswers[i] === q.ans) correct++; });
  const pct = Math.round((correct / EXAM_QUESTIONS.length) * 100);
  const grade = pct >= 90 ? 'A — Distinction' : pct >= 75 ? 'B — Credit' : pct >= 60 ? 'C — Pass' : pct >= 50 ? 'D — Borderline' : 'F — Fail';
  const gradeColor = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--red)';

  EXAM_QUESTIONS.forEach((q,i) => {
    const container = document.getElementById(`eq-${i}`);
    if(!container) return;
    container.querySelectorAll('.quiz-opt').forEach((o,j) => {
      o.classList.add('disabled');
      if(j === q.ans) o.classList.add('correct-answer');
      else if(j === examAnswers[i] && examAnswers[i] !== q.ans) o.classList.add('wrong-answer');
    });
  });

  const resultEl = document.getElementById('examResult');
  if(resultEl) {
    resultEl.innerHTML = `
      <div class="big-score">${pct}%</div>
      <div class="grade" style="color:${gradeColor}">${grade}</div>
      <p style="margin-top:16px;color:var(--fg2)">You answered <strong>${correct}</strong> out of <strong>${EXAM_QUESTIONS.length}</strong> questions correctly.</p>
      <button class="btn-quiz" style="margin-top:20px" onclick="examStarted=false;navigate('exam')"><i class="fas fa-redo" style="margin-right:8px"></i>Retake Exam</button>
    `;
    resultEl.classList.add('show');
    resultEl.scrollIntoView({behavior:'smooth'});
  }
  showToast(`Exam submitted! Score: ${pct}%`);
}

// ===== CONCEPT NOTE FORM =====
function renderConceptNote() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="module-header">
      <div class="mod-num">Module 10 — Practical Exercise</div>
      <h1>Concept Note Builder</h1>
      <p class="mod-desc">Complete this structured form to develop your research concept note. Each section includes guidance from course materials to help you write effectively.</p>
    </div>
    <div class="cn-form" id="cnForm">
      ${CN_SECTIONS.map(s => `
        <div class="cn-section">
          <h3>${s.label}</h3>
          <div class="cn-hint">${s.hint}</div>
          ${s.type === 'textarea' 
            ? `<textarea id="cn-${s.id}" placeholder="${s.placeholder}" rows="5"></textarea>`
            : s.type === 'select'
            ? `<select id="cn-${s.id}">${(s.options||[]).map(o=>`<option>${o}</option>`).join('')}</select>`
            : `<input type="text" id="cn-${s.id}" placeholder="${s.placeholder}">`}
        </div>`).join('')}
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
        <button class="btn-cn" onclick="previewConceptNote()"><i class="fas fa-eye" style="margin-right:8px"></i>Preview Concept Note</button>
        <button class="btn-preview" onclick="downloadConceptNote()"><i class="fas fa-download" style="margin-right:8px"></i>Download as Text</button>
        <button class="btn-preview" onclick="clearConceptNote()"><i class="fas fa-trash" style="margin-right:8px"></i>Clear Form</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-cn')?.classList.add('active');
}

function getConceptNoteData() {
  return CN_SECTIONS.reduce((acc, s) => {
    const el = document.getElementById('cn-' + s.id);
    acc[s.id] = el ? el.value.trim() : '';
    return acc;
  }, {});
}

function previewConceptNote() {
  const data = getConceptNoteData();
  const modal = document.getElementById('previewModal');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <h2><i class="fas fa-file-alt" style="margin-right:10px"></i>Concept Note Preview</h2>
    ${CN_SECTIONS.map(s => data[s.id] ? `
      <h4>${s.label}</h4>
      <p>${data[s.id]}</p>` : '').join('')}
  `;
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('previewModal').classList.remove('show');
}

function downloadConceptNote() {
  const data = getConceptNoteData();
  let text = 'RESEARCH CONCEPT NOTE\n' + '='.repeat(60) + '\n\n';
  CN_SECTIONS.forEach(s => {
    if(data[s.id]) text += `${s.label.toUpperCase()}\n${'-'.repeat(40)}\n${data[s.id]}\n\n`;
  });
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'concept_note.txt';
  a.click();
  showToast('Concept note downloaded!');
}

function clearConceptNote() {
  if(confirm('Clear all fields? This cannot be undone.')) {
    CN_SECTIONS.forEach(s => {
      const el = document.getElementById('cn-' + s.id);
      if(el) el.value = '';
    });
    showToast('Form cleared.');
  }
}

// ===== DOWNLOAD NOTES =====
function downloadNotes() {
  let text = 'CS RESEARCH METHODS — STUDY NOTES\n' + '='.repeat(60) + '\n\n';
  MODULES.forEach(m => {
    text += `MODULE ${m.id}: ${m.title.toUpperCase()}\n${'='.repeat(60)}\n\n`;
    m.notes.forEach(n => {
      text += `${n.heading}\n${'-'.repeat(40)}\n`;
      text += n.body.replace(/<[^>]+>/g, '') + '\n\n';
    });
    text += '\nKEY QUOTES\n' + '-'.repeat(40) + '\n';
    m.quotes.forEach(q => { text += `"${q.text}"\n— ${q.author}\n\n`; });
    text += '\nREFERENCES\n' + '-'.repeat(40) + '\n';
    m.refs.forEach(r => { text += `• ${r}\n`; });
    text += '\n\n';
  });
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cs_research_methods_notes.txt';
  a.click();
  showToast('Study notes downloaded!');
}

// ===== SEARCH =====
function setupSearch() {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if(q.length < 2) { results.classList.remove('show'); return; }
    const hits = [];
    MODULES.forEach(m => {
      m.notes.forEach(n => {
        const plain = n.body.replace(/<[^>]+>/g,'');
        const idx = plain.toLowerCase().indexOf(q);
        if(idx !== -1) {
          const snippet = plain.substring(Math.max(0, idx-40), idx+80).replace(q, `<mark>${q}</mark>`);
          hits.push({module: `Module ${m.id}: ${m.title}`, text: '...' + snippet + '...', id: m.id, heading: n.heading});
        }
      });
      m.quotes.forEach(qu => {
        if(qu.text.toLowerCase().includes(q)) {
          hits.push({module: `Module ${m.id}: ${m.title}`, text: qu.text.replace(new RegExp(q,'gi'), `<mark>$&</mark>`), id: m.id, heading: 'Quote'});
        }
      });
    });
    if(hits.length === 0) {
      results.innerHTML = '<div class="search-result-item"><div class="sr-text" style="color:var(--muted)">No results found.</div></div>';
    } else {
      results.innerHTML = hits.slice(0, 8).map(h => `
        <div class="search-result-item" onclick="navigate(${h.id});results.classList.remove('show');input.value=''">
          <div class="sr-module">${h.module} — ${h.heading}</div>
          <div class="sr-text">${h.text}</div>
        </div>`).join('');
    }
    results.classList.add('show');
  });
  document.addEventListener('click', e => {
    if(!e.target.closest('.search-box')) results.classList.remove('show');
  });
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
